<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Irrigation System</title>

    <style>
        body{
            margin:0;
            padding:0;
            font-family:Arial, sans-serif;
            background:#e8f5e9;
        }

        h1{
            text-align:center;
            background:#2e7d32;
            color:white;
            padding:20px;
            margin:0;
        }

        .container{
            width:90%;
            max-width:900px;
            margin:30px auto;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        .sensor{
            display:flex;
            justify-content:space-between;
            margin:15px 0;
            padding:12px;
            background:#f1f8e9;
            border-radius:8px;
            font-size:20px;
        }

        .status{
            color:green;
            font-weight:bold;
        }

        .buttons{
            text-align:center;
            margin-top:25px;
        }

        button{
            padding:12px 25px;
            margin:10px;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
        }

        .on{
            background:#4CAF50;
            color:white;
        }

        .off{
            background:#f44336;
            color:white;
        }

        .auto{
            background:#2196F3;
            color:white;
        }

        footer{
            text-align:center;
            margin-top:30px;
            color:#555;
        }
    </style>
</head>

<body>

<h1>🌱 Smart Irrigation Monitoring System</h1>

<div class="container">

<div class="card">

<div class="sensor">
<span>🌿 Soil Moisture</span>
<span id="soil">45 %</span>
</div>

<div class="sensor">
<span>🌡 Temperature</span>
<span id="temp">28 °C</span>
</div>

<div class="sensor">
<span>💧 Humidity</span>
<span id="hum">72 %</span>
</div>

<div class="sensor">
<span>🌧 Rain Status</span>
<span id="rain" class="status">No Rain</span>
</div>

<div class="sensor">
<span>🚰 Water Pump</span>
<span id="pump" class="status">OFF</span>
</div>

<div class="buttons">
<button class="on" onclick="pumpON()">Pump ON</button>
<button class="off" onclick="pumpOFF()">Pump OFF</button>
<button class="auto" onclick="autoMode()">Auto Mode</button>
</div>

</div>

</div>

 <a href="Smart Home Automation">
                View Project
            </a>
<footer>
Designed for Smart Irrigation System using Arduino / ESP32
</footer>

<script>

function pumpON(){
    document.getElementById("pump").innerHTML="ON";
    document.getElementById("pump").style.color="green";
}

function pumpOFF(){
    document.getElementById("pump").innerHTML="OFF";
    document.getElementById("pump").style.color="red";
}

function autoMode(){

    let soil = parseInt(document.getElementById("soil").innerHTML);

    if(soil < 30){
        document.getElementById("pump").innerHTML="ON";
        document.getElementById("pump").style.color="green";
    }
    else{
        document.getElementById("pump").innerHTML="OFF";
        document.getElementById("pump").style.color="red";
    }

    alert("Auto Mode Activated");
}

</script>

</body>
</html>
